<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Search</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


</head>
<body>
<main class="container">

    <h1>🔍 Search Posts</h1>

    <div class="search-box">
        <form method="get">
            <input name="creation_date__year__gte" placeholder="Created after or in year (e.g. 2024)">
            <input name="category__name" placeholder="Category (e.g. Technology)">
            <button type="submit">Search</button>
        </form>
    </div>

    {% if not posts %}
        <p style="text-align:center; color:#64748b;">No posts found</p>
    {% endif %}

    {% for post in posts %}
        <div class="card">
            <h3>{{ post.title }}</h3>
            <p>{{ post.content }}</p>

            <div class="meta">
                <p><strong>Author:</strong> {{ post.author.name }}</p>
                <p><strong>Category:</strong> {{ post.category.name }}</p>
                <p><strong>Date:</strong> {{ post.creation_date }}</p>
            </div>
        </div>
    {% endfor %}

</main>
</body>
</html>
