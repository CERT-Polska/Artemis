x-artemis-build:
  &artemis-build
  build:
     context: .
     dockerfile: docker/Dockerfile

services:
  web:
    env_file: env.test
    environment:
      API_TOKEN: api-token
    volumes:
      - data-web:/data
      - ./docker/karton-test.ini:/etc/karton/karton.ini

  autoreporter:
    env_file: env.test

  karton-bruter:
    <<: *artemis-build
    environment:
      REQUESTS_PER_SECOND: 20
      NUM_WORKERS_PER_CONTAINER_BRUTER: 5
    volumes: ["./docker/karton-test.ini:/etc/karton/karton.ini"]

  karton-classifier:
    <<: *artemis-build
    env_file: env.test
    volumes: ["./docker/karton-test.ini:/etc/karton/karton.ini"]

  karton-ftp_bruter:
    <<: *artemis-build
    env_file: env.test
    volumes: ["./docker/karton-test.ini:/etc/karton/karton.ini"]

  karton-mail_dns_scanner:
    <<: *artemis-build
    env_file: env.test
    volumes: ["./docker/karton-test.ini:/etc/karton/karton.ini"]

  karton-port_scanner:
    <<: *artemis-build
    env_file: env.test
    environment:
        SCANNING_PACKETS_PER_SECOND: 5
        CUSTOM_PORT_SCANNER_PORTS: 21,80,6379
    volumes: ["./docker/karton-test.ini:/etc/karton/karton.ini"]

  karton-sql_injection_detector:
    <<: *artemis-build
    env_file: env.test
    environment:
      SQL_INJECTION_STOP_ON_FIRST_MATCH: "false"
    volumes: ["./docker/karton-test.ini:/etc/karton/karton.ini"]

  karton-system:
    env_file: env.test
    volumes: ["./docker/karton-test.ini:/etc/karton/karton.ini"]
