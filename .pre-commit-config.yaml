repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: end-of-file-fixer
    exclude: offat_artemis.patch
  - id: trailing-whitespace
    exclude: offat_artemis.patch
  - id: check-merge-conflict
- repo: https://github.com/psf/black
  rev: 26.1.0
  hooks:
  - id: black
    exclude: offat_artemis.patch
- repo: https://github.com/pycqa/isort
  rev: 8.0.0
  hooks:
  - id: isort
    name: isort (python)
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.19.1
  hooks:
  - id: mypy
    args: [--strict]
    additional_dependencies:
    - aiohttp==3.13.3
    - alembic==1.18.4
    - dnspython==2.7.0
    - fastapi==0.116.1
    - flask==3.1.3
    - freezegun==1.5.5
    - jinja2==3.1.6
    - karton-core==5.9.1
    - git+https://github.com/CERT-Polska/mailgoose@v1.3.15#egg=libmailgoose&subdirectory=scan
    - more-itertools==10.8.0
    - openapi-spec-validator==0.8.4
    - packaging==26.0
    - prometheus-client==0.24.1
    - pymongo-stubs==0.2.0
    - requests-cache==1.3.1
    - requests-mock==1.12.1
    - sqlalchemy-stubs==0.4
    - typer==0.24.1
    - types-beautifulsoup4==4.12.0.6
    - types-Markdown==3.4.2.10
    - types-paramiko==2.7.2
    - types-psutil==6.1.0.20241221
    - types-psycopg2==2.9.21.11
    - types-PyMySQL==1.1.0.1
    - types-pytz==2023.3.0.1
    - types-PyYAML==6.0.12.11
    - types-redis==4.6.0.5
    - types-requests==2.31.0.2
    - types-retry==0.9.9.4
    - types-termcolor==1.1.6.2
    - types-tqdm==4.66.0.2
    - uvicorn==0.42.0
- repo: https://github.com/PyCQA/flake8
  rev: 7.3.0
  hooks:
  - id: flake8
    args: [artemis]
- repo: https://github.com/jazzband/pip-tools
  rev: v7.5.3
  hooks:
  - id: pip-compile
    name: pip-compile main
    args: [requirements.in, -o, requirements.txt]
    files: ^requirements\.(in|txt)$
    language_version: python3.11
  - id: pip-compile
    name: pip-compile docs
    args: [docs/requirements.in, -o, docs/requirements.txt]
    files: ^docs/requirements\.(in|txt)$
    language_version: python3.11
