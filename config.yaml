NUCLEI_MAX_NUM_LINKS_TO_PROCESS: 20
NUCLEI_CHUNK_SIZE: 200
ENABLE_PLACEHOLDER_PAGE_DETECTOR: false
PLACEHOLDER_PAGE_CONTENT_FILENAME: "modules/data/placeholder_page_content.txt"

# -PortScanner
PORT_SCANNER_PORT_LIST: "short"
CUSTOM_PORT_SCANNER_PORTS: []
ADD_PORTS_FROM_SHODAN_INTERNETDB: false
PORT_SCANNER_TIMEOUT_MILLISECONDS: 5000
PORT_SCANNER_MAX_BATCH_SIZE: 10
PORT_SCANNER_MAX_NUM_PORTS: 100

#- Postman
POSTMAN_MAIL_FROM: "from@example.com"
POSTMAN_MAIL_TO: "to@example.com"

# - RemovedDomainExistingVhost
REMOVED_DOMAIN_EXISTING_VHOST_PASSIVEDNS_URLS: null
REMOVED_DOMAIN_EXISTING_VHOST_REPORT_ONLY_SUBDOMAINS: false
REMOVED_DOMAIN_EXISTING_VHOST_PASSIVEDNS_SLEEP_BETWEEN_REQUESTS_SECONDS: 10
REMOVED_DOMAIN_EXISTING_VHOST_SIMILARITY_THRESHOLD: 0.5
REVERSE_DNS_APIS: ""

# - Shodan
SHODAN_API_KEY: ""

# - SSHBruter
ADDITIONAL_BRUTE_FORCE_SLEEP_SECONDS: 20

# - SubdomainEnumeration
SUBDOMAIN_ENUMERATION_RETRIES: 10
DNS_BRUTE_FORCE_TIME_LIMIT_SECONDS: 2400
DNS_QUERIES_PER_SECOND: 20
SUBDOMAIN_ENUMERATION_SLEEP_TIME_SECONDS: 60
SUBDOMAIN_ENUMERATION_GAU_ADDITIONAL_OPTIONS: ""

# - VCS
VCS_MAX_DB_SIZE_BYTES: 5242880

# - WordPressPlugins
WORDPRESS_SKIP_VERSION_CHECK_ON_LESS_POPULAR_PLUGINS: false

# - WordPressScanner
WORDPRESS_VERSION_AGE_DAYS: 90

# - DomainExpirationScanner
DOMAIN_EXPIRATION_TIMEFRAME_DAYS: 30

# - SqlInjectionDetector
SQL_INJECTION_STOP_ON_FIRST_MATCH: true 
SQL_INJECTION_NUM_RETRIES_TIME_BASED: 10 
SQL_INJECTION_TIME_THRESHOLD: 5

# - LFIDetector
LFI_STOP_ON_FIRST_MATCH: true
