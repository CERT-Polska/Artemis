---

# Database Connection
SAVE_LOGS_IN_DATABASE: true
POSTGRES_CONN_STR: "postgresql://postgres:postgres@postgres/artemis"
DB_CONN_STR: "mongodb://root:root@db"
REDIS_CONN_STR: "redis://redis:6379/1"

# Autoarchiever Settings
AUTOARCHIVER_INTERVAL_SECONDS: 3600
AUTOARCHIVER_TAG_ARCHIVE_MIN_AGE_SECONDS: 0
AUTOARCHIVER_MIN_AGE_SECONDS_INTERESTING: 15552000
AUTOARCHIVER_MIN_AGE_SECONDS_NOT_INTERESTING: 2592000
AUTOARCHIVER_PACK_SIZE: 2000
AUTOARCHIVER_OUTPUT_PATH: "/opt/archived-task-results/"

# Reporting Settings
REPORTING_MAX_VULN_AGE_DAYS: 180
REPORTING_SEPARATE_INSTITUTIONS: []
REPORTING_DEDUPLICATION_COMMON_HTTP_PORTS: [80, 443]
MIN_DAYS_BETWEEN_REMINDERS__SEVERITY_LOW: 540
MIN_DAYS_BETWEEN_REMINDERS__SEVERITY_MEDIUM: 120
MIN_DAYS_BETWEEN_REMINDERS__SEVERITY_HIGH: 60
ADDITIONAL_SEVERITY_FILE: null

# Locking Settings
LOCK_SCANNED_TARGETS: false
LOCK_SLEEP_MIN_SECONDS: 0.1
LOCK_SLEEP_MAX_SECONDS: 0.5
QUEUE_LOCATION_MAX_AGE_SECONDS: 900
SCAN_DESTINATION_LOCK_MAX_TRIES: 2

# PublicSuffixes Settings
ALLOW_SUBDOMAIN_ENUMERATION_IN_PUBLIC_SUFFIXES: false
ADDITIONAL_PUBLIC_SUFFIXES: []

# Limits Settings
TASK_TIMEOUT_SECONDS: 43200
REQUEST_TIMEOUT_SECONDS: 5
SCAN_SPEED_OVERRIDES_FILE: ""
REQUESTS_PER_SECOND: 0

# Misc Settings
DEFAULT_MODULE_NUM_RETRIES: 1
SLOW_MODULE_NUM_RETRIES: 1
API_TOKEN: null
REMOVE_LOGS_AFTER_DAYS: 30
STOP_SCANNING_MODULES_IF_FREE_DISK_SPACE_LOWER_THAN_MB: 1000
BLOCKLIST_FILE: null
CUSTOM_USER_AGENT: ""
LOG_LEVEL: "INFO"
LOGGING_FORMAT_STRING: "[%(levelname)s] - [%(asctime)s] %(filename)s - in %(funcName)s() (line %(lineno)d): %(message)s"
PASSWORD_BRUTER_ADDITIONAL_PASSWORDS: []
STRIPPED_PREFIXES: ["www"]
VERIFY_REVDNS_IN_SCOPE: true
NUM_DNS_RESOLVER_RETRIES: 3
MAX_NUM_TASKS_TO_PROCESS: 1000
CONTENT_PREFIX_SIZE: 102400
MODULES_DISABLED_BY_DEFAULT: ["admin_panel_login_bruter" ,"api_scanner","dangling_dns_detector","example","humble","ssh_bruter","xss_scanner"]
SUBDOMAIN_ENUMERATION_TTL_DAYS: 10
ADDITIONAL_HOSTS_FILE_PATH: ""
MAX_URLS_TO_SCAN: 25
CLEANUP_RAISE_ERROR_ON_NON_UNFINISHED_ANALYSES: false


# Modules Settings
# - AdminPanelLoginBruter
ADMIN_PANEL_LOGIN_BRUTER_NUM_RECHECKS: 10
# - APIScanner
ONLY_GET_REQUESTS: true
# - Bruter
BRUTER_FILE_LIST: "short"
BRUTER_FALSE_POSITIVE_THRESHOLD: 0.1
BRUTER_FOLLOW_REDIRECTS: true
# -DanglingDnsDetector
DANGLING_DNS_SKIP_ROOT_DOMAIN: false
DANGLING_DNS_NUMBER_OF_RETRIES_FOR_IP: 20
DANGLING_DNS_MAX_DELAY_RETRY: 3600
DANGLING_DNS_DELAY_STEP: 600
# - DNSScanner
ZONE_TRANSFER_SIZE_REPORTING_THRESHOLD: 2
# - FTPBruter
FTP_BRUTER_TEST_FILE_NAME_PREFIX: "test-"
# - Humble
HUMBLE_HEADERS_TO_REPORT: ["Content-Security-Policy", "Strict-Transport-Security", "X-Content-Type-Options"]
# - Nuclei
NUCLEI_TEMPLATE_LISTS: "known_exploited_vulnerabilities, log_exposures, exposed_panels"
NUCLEI_SEVERITY_THRESHOLD: "high_and_above"
NUCLEI_INTERACTSH_SERVER: null  
NUCLEI_CHECK_TEMPLATE_LIST: true  
NUCLEI_SECONDS_PER_REQUEST_ON_RETRY: 0.1  
NUCLEI_TEMPLATE_GROUPS_FILE: "/opt/artemis/modules/data/nuclei_template_groups.json"  
NUCLEI_MAX_BATCH_SIZE: 10  
