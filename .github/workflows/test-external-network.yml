name: "tests / external network"

on:
  pull_request:
    branches: [ '**' ]

jobs:
  external-network:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
      - name: run real network tests
        run: bash ./scripts/test-external-network
